services:
  minio:
    image: minio/minio:latest
    container_name: minio-s3

    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}

    volumes:
      - minio_data:/data

volumes:
  minio_data: